services:
  - type: web
    name: streaming-service
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "python main.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PORT
        value: "10000"
      - key: FFMPEG_PATH
        value: "./bin/ffmpeg"
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false